<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analemma</title>
  <style>
    :root {
      --bg:      #080e18;
      --surface: #0c1524;
      --border:  #1b2a3d;
      --text:    #dce8f5;
      --muted:   #5f7e9e;
      --accent:  #f5a623;
      --curve:   #4ea8de;
      --dot:     #93c5fd;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }
    header {
      padding: .7rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: .75rem;
      flex-wrap: wrap;
    }
    h1 {
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
    }
    #subtitle { font-size: .8rem; color: var(--muted); }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: .75rem;
      min-height: 0;
    }
    #chart {
      width: 100%;
      height: 100%;
      max-width: 700px;
      max-height: 580px;
      touch-action: none;
      cursor: crosshair;
    }
    /* SVG text styles */
    .tick-lbl { fill: var(--muted); font-size: 10px; font-family: inherit; }
    .ax-title  { fill: var(--muted); font-size: 11px; font-family: inherit; }
    .h-label   { fill: var(--muted); font-size: 10px; font-family: inherit; font-style: italic; }

    /* Info panel */
    #info {
      display: none;
      position: fixed;
      z-index: 20;
      pointer-events: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .55rem .75rem;
      font-size: .8rem;
      color: var(--text);
      min-width: 210px;
      box-shadow: 0 4px 20px rgba(0,0,0,.55);
      line-height: 1.5;
    }
    #info.pinned { border-color: var(--accent); }
    .info-date  { font-weight: 600; font-size: .88rem; margin-bottom: .3rem; color: var(--accent); }
    .info-row   { display: flex; justify-content: space-between; gap: 1rem; }
    .info-row span:first-child { color: var(--muted); }
    .info-sep   { border: none; border-top: 1px solid var(--border); margin: .3rem 0; }
    .info-moon  { color: var(--muted); margin-top: .2rem; font-size: .77rem; }
    .info-polar { color: var(--muted); font-style: italic; }

    #controls {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .45rem 1.5rem;
      border-bottom: 1px solid var(--border);
      font-size: .8rem;
      color: var(--muted);
      flex-wrap: wrap;
    }
    #controls label { white-space: nowrap; }
    #timeSlider {
      flex: 1;
      max-width: 320px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    #timeReadout {
      font-variant-numeric: tabular-nums;
      color: var(--text);
      min-width: 3em;
    }
    .ctrl-sep { color: var(--border); }
    .view-btns {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .view-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: .2rem .65rem;
      font-size: .78rem;
      font-family: inherit;
    }
    .view-btn:hover { background: var(--border); }
    .view-btn.active { background: var(--border); color: var(--text); }

    footer {
      padding: .45rem 1.5rem;
      border-top: 1px solid var(--border);
      font-size: .68rem;
      color: var(--muted);
    }

    /* Location controls */
    #loc-controls {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .45rem 1.5rem;
      border-bottom: 1px solid var(--border);
      font-size: .8rem;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .city-wrap { position: relative; }
    #cityInput {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: .25rem .5rem;
      font-size: .8rem;
      font-family: inherit;
      width: 180px;
    }
    #cityInput:focus { outline: none; border-color: var(--accent); }
    #cityDrop {
      display: none;
      position: absolute;
      top: calc(100% + 2px);
      left: 0;
      z-index: 100;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      list-style: none;
      min-width: 210px;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: 0 4px 16px rgba(0,0,0,.55);
    }
    #cityDrop.open { display: block; }
    #cityDrop li {
      padding: .3rem .65rem;
      cursor: pointer;
      color: var(--text);
      font-size: .8rem;
      white-space: nowrap;
    }
    #cityDrop li:hover, #cityDrop li.ac-active { background: var(--border); color: var(--accent); }
    #cityDrop li.drop-sep {
      padding: .18rem .65rem;
      font-size: .72rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      cursor: default;
      pointer-events: none;
      user-select: none;
    }
    .coord-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: .25rem .4rem;
      font-size: .8rem;
      font-family: inherit;
      width: 82px;
    }
    .coord-input:focus { outline: none; border-color: var(--accent); }
    /* hide number spinners */
    .coord-input::-webkit-outer-spin-button,
    .coord-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .coord-input[type=number] { -moz-appearance: textfield; }
    #geoBtn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
      padding: .18rem .45rem;
      font-size: .85rem;
      line-height: 1.3;
    }
    #geoBtn:hover { border-color: var(--accent); }
  </style>
</head>
<body>

<header>
  <h1>Analemma</h1>
  <span id="subtitle"></span>
</header>

<div id="loc-controls">
  <label>Location</label>
  <div class="city-wrap">
    <input type="text" id="cityInput" placeholder="Search city…" autocomplete="off" spellcheck="false">
    <ul id="cityDrop"></ul>
  </div>
  <label for="latInput">Lat</label>
  <input type="number" id="latInput" class="coord-input" min="-90"  max="90"   step="0.0001">
  <label for="lonInput">Lon</label>
  <input type="number" id="lonInput" class="coord-input" min="-180" max="180"  step="0.0001">
  <button id="geoBtn" title="Use my location">📍</button>
</div>

<div id="controls">
  <label for="timeSlider">Time (LMST)</label>
  <input type="range" id="timeSlider" min="0" max="1439" step="1" value="720">
  <span id="timeReadout">12:00</span>
  <span class="ctrl-sep">|</span>
  <span class="view-btns">
    <button id="btnSky" class="view-btn active">Sky</button><button id="btnEot" class="view-btn">EoT</button>
  </span>
  <span class="ctrl-sep">|</span>
  <button id="btnMarkers" class="view-btn" title="Toggle month &amp; solstice markers">Markers</button>
</div>

<main>
  <svg id="chart" viewBox="0 0 660 540" xmlns="http://www.w3.org/2000/svg"></svg>
</main>

<div id="info"></div>

<footer id="footer">
  Sky view · azimuth × altitude · Solar positions via SunCalc (MIT) · Values are approximate, for illustration only
</footer>

<script>
// ─── SunCalc vendored ────────────────────────────────────────────────────────
// Source: https://github.com/mourner/suncalc  (MIT licence)
const SunCalc = (() => {
  const PI=Math.PI,sin=Math.sin,cos=Math.cos,tan=Math.tan,
        asin=Math.asin,atan=Math.atan2,acos=Math.acos,rad=PI/180;
  const dayMs=864e5,J1970=2440588,J2000=2451545;
  const toJulian=d=>d.valueOf()/dayMs-.5+J1970;
  const fromJulian=j=>new Date((j+.5-J1970)*dayMs);
  const toDays=d=>toJulian(d)-J2000;
  const e=rad*23.4397;
  const rightAscension=(l,b)=>atan(sin(l)*cos(e)-tan(b)*sin(e),cos(l));
  const declination=(l,b)=>asin(sin(b)*cos(e)+cos(b)*sin(e)*sin(l));
  const _azimuth=(H,phi,dec)=>atan(sin(H),cos(H)*sin(phi)-tan(dec)*cos(phi));
  const _altitude=(H,phi,dec)=>asin(sin(phi)*sin(dec)+cos(phi)*cos(dec)*cos(H));
  const siderealTime=(d,lw)=>rad*(280.16+360.9856235*d)-lw;
  const astroRefraction=h=>{if(h<0)h=0;return .0002967/Math.tan(h+.00312536/(h+.08901179));};
  const solarMeanAnomaly=d=>rad*(357.5291+.98560028*d);
  const eclipticLongitude=M=>{
    const C=rad*(1.9148*sin(M)+.02*sin(2*M)+.0003*sin(3*M)),P=rad*102.9372;
    return M+C+P+PI;
  };
  const sunCoords=d=>{const M=solarMeanAnomaly(d),L=eclipticLongitude(M);
    return{dec:declination(L,0),ra:rightAscension(L,0)};};
  const getPosition=(date,lat,lng)=>{
    const lw=rad*-lng,phi=rad*lat,d=toDays(date),c=sunCoords(d),H=siderealTime(d,lw)-c.ra;
    return{azimuth:_azimuth(H,phi,c.dec),altitude:_altitude(H,phi,c.dec)};
  };
  const TIMES=[[-0.833,'sunrise','sunset'],[-0.3,'sunriseEnd','sunsetStart'],
    [-6,'dawn','dusk'],[-12,'nauticalDawn','nauticalDusk'],[-18,'nightEnd','night'],[6,'goldenHourEnd','goldenHour']];
  const J0=.0009;
  const julianCycle=(d,lw)=>Math.round(d-J0-lw/(2*PI));
  const approxTransit=(Ht,lw,n)=>J0+(Ht+lw)/(2*PI)+n;
  const solarTransitJ=(ds,M,L)=>J2000+ds+.0053*sin(M)-.0069*sin(2*L);
  const hourAngle=(h,phi,d)=>acos((sin(h)-sin(phi)*sin(d))/(cos(phi)*cos(d)));
  const observerAngle=h=>-2.076*Math.sqrt(h)/60;
  const getSetJ=(h,lw,phi,dec,n,M,L)=>{const w=hourAngle(h,phi,dec),a=approxTransit(w,lw,n);return solarTransitJ(a,M,L);};
  const getTimes=(date,lat,lng,height=0)=>{
    const lw=rad*-lng,phi=rad*lat,dh=observerAngle(height),d=toDays(date),
          n=julianCycle(d,lw),ds=approxTransit(0,lw,n),M=solarMeanAnomaly(ds),
          L=eclipticLongitude(M),dec=declination(L,0),Jnoon=solarTransitJ(ds,M,L);
    const r={solarNoon:fromJulian(Jnoon),nadir:fromJulian(Jnoon-.5)};
    for(const t of TIMES){const h0=(t[0]+dh)*rad,Jset=getSetJ(h0,lw,phi,dec,n,M,L),Jrise=Jnoon-(Jset-Jnoon);
      r[t[1]]=fromJulian(Jrise);r[t[2]]=fromJulian(Jset);}
    return r;
  };
  const moonCoords=d=>{const L=rad*(218.316+13.176396*d),M=rad*(134.963+13.064993*d),
    F=rad*(93.272+13.22935*d),l=L+rad*6.289*sin(M),b=rad*5.128*sin(F),dt=385001-20905*cos(M);
    return{ra:rightAscension(l,b),dec:declination(l,b),dist:dt};};
  const getMoonIllumination=date=>{
    const d=toDays(date||new Date()),s=sunCoords(d),m=moonCoords(d),sdist=149598000,
          phi=acos(sin(s.dec)*sin(m.dec)+cos(s.dec)*cos(m.dec)*cos(s.ra-m.ra)),
          inc=atan(sdist*sin(phi),m.dist-sdist*cos(phi)),
          angle=atan(cos(s.dec)*sin(s.ra-m.ra),sin(s.dec)*cos(m.dec)-cos(s.dec)*sin(m.dec)*cos(s.ra-m.ra));
    return{fraction:(1+cos(inc))/2,phase:.5+.5*inc*(angle<0?-1:1)/PI,angle};
  };
  return{getPosition,getTimes,getMoonIllumination};
})();

// ── NOAA: Equation of Time + Declination ─────────────────────────────────────
// Returns { eot: minutes, declDeg: degrees } for a given Date.
function solarEoTDecl(date) {
  const PI  = Math.PI;
  const JD  = date.valueOf() / 86400000 + 2440587.5;
  const T   = (JD - 2451545.0) / 36525.0;                         // Julian centuries from J2000
  const L0  = ((280.46646 + T * (36000.76983 + T * 0.0003032)) % 360 + 360) % 360;  // deg
  const M   = 357.52911 + T * (35999.05029 - 0.0001537 * T);      // deg
  const e   = 0.016708634 - T * (0.000042037 + 0.0000001267 * T); // eccentricity
  const eps0 = 23 + (26 + (21.448 - T * (46.8150 + T * (0.00059 - T * 0.001813))) / 60) / 60; // mean obliquity, deg
  const omega = 125.04452 - 1934.136261 * T;
  const eps   = eps0 + 0.00256 * Math.cos(omega * PI / 180);       // corrected obliquity, deg

  const Mrad = M * PI / 180;
  const C = (1.914602 - T * (0.004817 + 0.000014 * T)) * Math.sin(Mrad)
          + (0.019993 - 0.000101 * T) * Math.sin(2 * Mrad)
          + 0.000289 * Math.sin(3 * Mrad);
  const sunLon = L0 + C;                                            // true longitude, deg
  const lambda = sunLon - 0.00569 - 0.00478 * Math.sin(omega * PI / 180); // apparent, deg

  const declDeg = Math.asin(Math.sin(eps * PI / 180) * Math.sin(lambda * PI / 180)) * 180 / PI;

  // EoT via NOAA y-formula (result in minutes)
  const y    = Math.tan(eps * PI / 360) ** 2;                      // tan²(ε/2)
  const L0r  = L0 * PI / 180;
  const Mr   = M  * PI / 180;
  const eot  = (y * Math.sin(2 * L0r)
              - 2 * e * Math.sin(Mr)
              + 4 * e * y * Math.sin(Mr) * Math.cos(2 * L0r)
              - 0.5 * y * y * Math.sin(4 * L0r)
              - 1.25 * e * e * Math.sin(2 * Mr)) * (4 * 180 / PI);

  return { eot, declDeg };
}

// ── Build per-day positions ───────────────────────────────────────────────────
function buildPoints(year, lat, lon, lmstHour = 12) {
  const leap = year % 4 === 0 && (year % 100 !== 0 || year % 400 === 0);
  const days  = leap ? 366 : 365;
  const utcH  = lmstHour - lon / 15;
  const pts   = [];
  for (let i = 0; i < days; i++) {
    const ms      = Date.UTC(year, 0, 1 + i) + utcH * 3600000;
    const dayDate = new Date(Date.UTC(year, 0, 1 + i));
    const pos     = SunCalc.getPosition(new Date(ms), lat, lon);
    const { eot, declDeg } = solarEoTDecl(dayDate);
    pts.push({
      date:    dayDate,
      azDeg:   pos.azimuth  * R2D,
      altDeg:  pos.altitude * R2D,
      eot,
      declDeg,
      doy:    i,
      sx: 0, sy: 0  // SVG coords, filled in render()
    });
  }
  return pts;
}

// ── SVG helpers ───────────────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
const el = (tag, attrs = {}, text) => {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
};

// ── Module-level interaction state ────────────────────────────────────────────
let _pts        = [];
let _loc        = { ...DEFAULT };
let _pinned     = false;
let _pinnedDoy  = null;
let _view       = 'sky';  // 'sky' | 'eot'
let _markersOn  = false;

// ── Astronomy helpers ─────────────────────────────────────────────────────────
function moonPhaseInfo(phase) {
  const phases = [
    [0.0625, '🌑', 'New Moon'],
    [0.1875, '🌒', 'Waxing Crescent'],
    [0.3125, '🌓', 'First Quarter'],
    [0.4375, '🌔', 'Waxing Gibbous'],
    [0.5625, '🌕', 'Full Moon'],
    [0.6875, '🌖', 'Waning Gibbous'],
    [0.8125, '🌗', 'Last Quarter'],
    [0.9375, '🌘', 'Waning Crescent'],
  ];
  for (const [limit, icon, name] of phases) if (phase < limit) return { icon, name };
  return { icon: '🌑', name: 'New Moon' };
}

function fmtDuration(ms) {
  if (ms <= 0) return '0h 0m';
  const h = Math.floor(ms / 3600000);
  const m = Math.round((ms % 3600000) / 60000);
  return `${h}h ${m < 10 ? '0' : ''}${m}m`;
}

function toSolarTimeStr(date, lon) {
  if (!date || isNaN(date.getTime())) return null;
  let lmst = date.getUTCHours() + date.getUTCMinutes() / 60 + date.getUTCSeconds() / 3600 + lon / 15;
  lmst = ((lmst % 24) + 24) % 24;
  const h = Math.floor(lmst);
  const m = Math.round((lmst % 1) * 60);
  return `${String(h).padStart(2,'0')}:${String(m === 60 ? 0 : m).padStart(2,'0')}`;
}

// ── Markers layer: month ticks, solstices/equinoxes, today ───────────────────
function drawMarkers(svg, pts, M, pw, ph, year, showMarkers = true) {
  const now      = new Date();
  const todayDoy = year === now.getFullYear()
    ? Math.floor((Date.UTC(now.getFullYear(), now.getMonth(), now.getDate())
        - Date.UTC(now.getFullYear(), 0, 1)) / 864e5)
    : -1;

  // Solstices = max/min declination
  let summerIdx = 0, winterIdx = 0, maxDecl = -Infinity, minDecl = Infinity;
  for (let i = 0; i < pts.length; i++) {
    if (pts[i].declDeg > maxDecl) { maxDecl = pts[i].declDeg; summerIdx = i; }
    if (pts[i].declDeg < minDecl) { minDecl = pts[i].declDeg; winterIdx = i; }
  }
  // Equinoxes = declination sign crossing
  let springIdx = -1, autumnIdx = -1;
  for (let i = 1; i < pts.length; i++) {
    const a = pts[i-1].declDeg, b = pts[i].declDeg;
    if (a <= 0 && b > 0 && springIdx === -1) springIdx = i;
    if (a >= 0 && b < 0 && autumnIdx === -1) autumnIdx = i;
  }

  const specialSet = new Set(
    [summerIdx, winterIdx, springIdx, autumnIdx, todayDoy].filter(i => i >= 0)
  );
  const MONTH = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const cx = M.left + pw / 2, cy = M.top + ph / 2;

  const circG = el('g', { 'clip-path': 'url(#pc)', 'pointer-events': 'none' });
  const lblG  = el('g', { 'pointer-events': 'none' });

  if (showMarkers) {
    // Month start ticks
    for (const p of pts) {
      if (p.date.getUTCDate() !== 1) continue;
      if (specialSet.has(p.doy)) continue;
      const m = p.date.getUTCMonth();
      circG.appendChild(el('circle', {
        cx: p.sx.toFixed(2), cy: p.sy.toFixed(2),
        r: 3, fill: 'var(--surface)', stroke: 'var(--muted)', 'stroke-width': 1.2
      }));
      const dx = p.sx - cx, dy = p.sy - cy;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const ox = (dx / dist) * 14, oy = (dy / dist) * 14;
      const anchor = ox > 2 ? 'start' : ox < -2 ? 'end' : 'middle';
      lblG.appendChild(el('text', {
        x: (p.sx + ox).toFixed(1), y: (p.sy + oy + 3).toFixed(1),
        'text-anchor': anchor,
        fill: 'var(--muted)', 'font-size': '8px', 'font-family': 'inherit'
      }, MONTH[m]));
    }

    // Solstice & equinox markers
    const events = [
      { idx: summerIdx, color: '#f5a623' },
      { idx: winterIdx, color: '#93c5fd' },
      { idx: springIdx, color: '#5eead4' },
      { idx: autumnIdx, color: '#5eead4' },
    ].filter(ev => ev.idx >= 0 && ev.idx < pts.length);

    for (const ev of events) {
      const p = pts[ev.idx];
      circG.appendChild(el('circle', {
        cx: p.sx.toFixed(2), cy: p.sy.toFixed(2),
        r: 5, fill: ev.color, opacity: .9
      }));
      const dateStr = p.date.toLocaleString('en', { month: 'short', day: 'numeric', timeZone: 'UTC' });
      const lblY = p.sy > cy ? p.sy + 14 : p.sy - 8;
      lblG.appendChild(el('text', {
        x: p.sx.toFixed(1), y: lblY.toFixed(1),
        'text-anchor': 'middle',
        fill: ev.color, 'font-size': '9px', 'font-family': 'inherit', 'font-weight': '600'
      }, dateStr));
    }
  }

  // Today marker
  if (todayDoy >= 0 && todayDoy < pts.length) {
    const tp = pts[todayDoy];
    circG.appendChild(el('circle', {
      cx: tp.sx.toFixed(2), cy: tp.sy.toFixed(2),
      r: 8, fill: 'var(--accent)', opacity: .2
    }));
    circG.appendChild(el('circle', {
      cx: tp.sx.toFixed(2), cy: tp.sy.toFixed(2),
      r: 5, fill: 'var(--accent)'
    }));
    const lblY = tp.sy > M.top + 20 ? tp.sy - 12 : tp.sy + 18;
    lblG.appendChild(el('text', {
      x: (tp.sx + 8).toFixed(1), y: lblY.toFixed(1),
      fill: 'var(--accent)', 'font-size': '10px', 'font-family': 'inherit', 'font-weight': '600'
    }, 'Today'));
  }

  svg.appendChild(circG);
  svg.appendChild(lblG);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render({ lat, lon, name } = DEFAULT, lmstHour = 12, year = YEAR) {
  _loc = { lat, lon, name };
  const svg = document.getElementById('chart');
  svg.innerHTML = '';

  const W = 660, H = 540;
  const M = { top: 32, right: 80, bottom: 58, left: 58 };
  const pw = W - M.left - M.right;
  const ph = H - M.top  - M.bottom;

  const pts = buildPoints(year, lat, lon, lmstHour);

  // ── Defs: clip path (both views need it)
  const defs = el('defs');
  defs.appendChild((() => {
    const cp = el('clipPath', { id: 'pc' });
    cp.appendChild(el('rect', { x: M.left, y: M.top, width: pw, height: ph }));
    return cp;
  })());

  // ── View-specific: axis math, backgrounds, grid, labels
  if (_view === 'sky') {
    const azValues  = pts.map(p => p.azDeg);
    const altValues = pts.map(p => p.altDeg);
    const azCenter  = (Math.max(...azValues) + Math.min(...azValues)) / 2;
    const azHalf    = Math.max(Math.max(...azValues) - azCenter, azCenter - Math.min(...azValues));
    const azPad     = Math.max(azHalf * 1.6, 3.5);
    const azMin = azCenter - azPad, azMax = azCenter + azPad;
    const altMax = Math.ceil((Math.max(...altValues) + 6) / 10) * 10;
    const altMin = 0;

    const xOf  = az  => M.left + (az  - azMin)  / (azMax  - azMin)  * pw;
    const yOf  = alt => M.top  + ph  - (alt - altMin) / (altMax - altMin) * ph;
    const horizY = yOf(0);

    for (const p of pts) { p.sx = xOf(p.azDeg); p.sy = yOf(p.altDeg); }

    const grad = el('linearGradient', { id: 'skyG', x1: 0, y1: 0, x2: 0, y2: 1 });
    grad.appendChild(el('stop', { offset: '0%',   'stop-color': '#06111f' }));
    grad.appendChild(el('stop', { offset: '100%', 'stop-color': '#0b1d31' }));
    defs.appendChild(grad);
    svg.appendChild(defs);

    svg.appendChild(el('rect', { x: 0, y: 0, width: W, height: H, fill: 'var(--bg)' }));
    svg.appendChild(el('rect', { x: M.left, y: M.top, width: pw, height: ph,
      fill: 'var(--surface)', rx: 3 }));
    const skyH = Math.max(0, Math.min(horizY - M.top, ph));
    if (skyH > 0) {
      svg.appendChild(el('rect', { x: M.left, y: M.top, width: pw, height: skyH,
        fill: 'url(#skyG)', 'clip-path': 'url(#pc)' }));
    }

    // Altitude grid
    for (let a = 0; a <= altMax; a += 10) {
      const y = yOf(a);
      if (y < M.top - 1 || y > M.top + ph + 1) continue;
      svg.appendChild(el('line', { x1: M.left, y1: y, x2: M.left + pw, y2: y,
        stroke: a === 0 ? '#1e3a5f' : 'var(--border)',
        'stroke-width': a === 0 ? 1.5 : .5 }));
      svg.appendChild(el('text', { x: M.left - 7, y: y + 3.5,
        'text-anchor': 'end', class: 'tick-lbl' }, a + '°'));
    }

    // Azimuth grid
    const azStep = azPad <= 5 ? 2 : azPad <= 9 ? 3 : 5;
    for (let a = Math.ceil(azMin / azStep) * azStep; a <= azMax + .01; a += azStep) {
      const x = xOf(a);
      if (x < M.left - 1 || x > M.left + pw + 1) continue;
      svg.appendChild(el('line', { x1: x, y1: M.top, x2: x, y2: M.top + ph,
        stroke: Math.abs(a) < .01 ? '#1e3a5f' : 'var(--border)',
        'stroke-width': Math.abs(a) < .01 ? 1 : .5,
        'stroke-dasharray': Math.abs(a) < .01 ? '' : '4 3' }));
      const lab = Math.abs(a) < .01 ? 'S' : a > 0 ? `${a}° W` : `${Math.abs(a)}° E`;
      svg.appendChild(el('text', { x, y: M.top + ph + 15,
        'text-anchor': 'middle', class: 'tick-lbl' }, lab));
    }

    svg.appendChild(el('text', { x: M.left + pw + 6, y: horizY + 3.5, class: 'h-label' }, 'Horizon'));

    const midX = M.left + pw / 2, midY = M.top + ph / 2;
    svg.appendChild(el('text', { x: 15, y: midY, transform: `rotate(-90,15,${midY})`,
      'text-anchor': 'middle', class: 'ax-title' }, 'Altitude'));
    svg.appendChild(el('text', { x: midX, y: H - 10, 'text-anchor': 'middle', class: 'ax-title' },
      '← East   Azimuth from South   West →'));

  } else {
    // ── EoT × Declination view
    const eotVals = pts.map(p => p.eot);
    const eotMin  = Math.floor(Math.min(...eotVals) - 2);
    const eotMax  = Math.ceil( Math.max(...eotVals) + 2);
    const declMin = -25, declMax = 25;

    const xOf = eot  => M.left + (eot  - eotMin)  / (eotMax  - eotMin)  * pw;
    const yOf = decl => M.top  + ph   - (decl - declMin) / (declMax - declMin) * ph;

    for (const p of pts) { p.sx = xOf(p.eot); p.sy = yOf(p.declDeg); }

    svg.appendChild(defs);
    svg.appendChild(el('rect', { x: 0, y: 0, width: W, height: H, fill: 'var(--bg)' }));
    svg.appendChild(el('rect', { x: M.left, y: M.top, width: pw, height: ph,
      fill: 'var(--surface)', rx: 3 }));

    // Declination grid (every 5°)
    for (let d = -25; d <= 25; d += 5) {
      const y = yOf(d);
      svg.appendChild(el('line', { x1: M.left, y1: y, x2: M.left + pw, y2: y,
        stroke: d === 0 ? '#1e3a5f' : 'var(--border)',
        'stroke-width': d === 0 ? 1.5 : .5,
        'stroke-dasharray': d === 0 ? '' : '4 3' }));
      svg.appendChild(el('text', { x: M.left - 7, y: y + 3.5,
        'text-anchor': 'end', class: 'tick-lbl' }, d + '°'));
    }

    // EoT grid (every 4 minutes)
    for (let e = Math.ceil(eotMin / 4) * 4; e <= eotMax + .01; e += 4) {
      const x = xOf(e);
      if (x < M.left - 1 || x > M.left + pw + 1) continue;
      svg.appendChild(el('line', { x1: x, y1: M.top, x2: x, y2: M.top + ph,
        stroke: Math.abs(e) < .01 ? '#1e3a5f' : 'var(--border)',
        'stroke-width': Math.abs(e) < .01 ? 1 : .5,
        'stroke-dasharray': Math.abs(e) < .01 ? '' : '4 3' }));
      const lab = e === 0 ? '0' : e > 0 ? `+${e}` : String(e);
      svg.appendChild(el('text', { x, y: M.top + ph + 15,
        'text-anchor': 'middle', class: 'tick-lbl' }, lab));
    }

    svg.appendChild(el('text', { x: M.left + pw + 6, y: yOf(0) + 3.5, class: 'h-label' }, 'Equator'));

    const midX = M.left + pw / 2, midY = M.top + ph / 2;
    svg.appendChild(el('text', { x: 15, y: midY, transform: `rotate(-90,15,${midY})`,
      'text-anchor': 'middle', class: 'ax-title' }, 'Declination (°)'));
    svg.appendChild(el('text', { x: midX, y: H - 10, 'text-anchor': 'middle', class: 'ax-title' },
      '← fast   Equation of Time (min)   slow →'));
  }

  _pts = pts;

  // ── Analemma path (both views)
  const pathD = pts.map((p, i) =>
    `${i ? 'L' : 'M'}${p.sx.toFixed(2)},${p.sy.toFixed(2)}`
  ).join('') + 'Z';
  svg.appendChild(el('path', {
    d: pathD, fill: 'none',
    stroke: 'var(--curve)', 'stroke-width': 2,
    'stroke-linecap': 'round', 'stroke-linejoin': 'round',
    opacity: .9, 'clip-path': 'url(#pc)'
  }));

  // ── Dots (uniform background)
  const dotsG = el('g', { 'clip-path': 'url(#pc)', 'pointer-events': 'none' });
  for (const p of pts) {
    dotsG.appendChild(el('circle', {
      cx: p.sx.toFixed(2), cy: p.sy.toFixed(2),
      r: 1.8, fill: 'var(--dot)', opacity: .45
    }));
  }
  svg.appendChild(dotsG);

  // ── Markers: month starts, solstices, equinoxes, today
  drawMarkers(svg, pts, M, pw, ph, year, _markersOn);

  // ── Highlight ring
  svg.appendChild(el('circle', {
    id: 'hl', r: 7, cx: -100, cy: -100,
    fill: 'rgba(245,166,35,.18)', stroke: 'var(--accent)', 'stroke-width': 2,
    'pointer-events': 'none', 'clip-path': 'url(#pc)'
  }));

  // ── Transparent hit rect
  svg.appendChild(el('rect', {
    id: 'hit', x: M.left, y: M.top, width: pw, height: ph,
    fill: 'transparent'
  }));

  // ── Subtitle
  const h = Math.floor(lmstHour), mm = Math.round((lmstHour % 1) * 60);
  const timeStr = `${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  const viewLabel = _view === 'sky' ? 'Sky' : 'EoT × Decl';
  document.getElementById('subtitle').textContent =
    `${name} · ${year} · LMST ${timeStr} · ${viewLabel}`;

  document.getElementById('footer').textContent = _view === 'sky'
    ? 'Sky view · azimuth × altitude · Solar positions via SunCalc (MIT) · Values are approximate, for illustration only'
    : 'EoT × Declination view · location-independent · Equation of time via NOAA formulae · Values are approximate, for illustration only';
}

// ── Interaction ───────────────────────────────────────────────────────────────
function setupInteraction() {
  const svg  = document.getElementById('chart');
  const info = document.getElementById('info');
  const fmt  = new Intl.DateTimeFormat('en', { month: 'long', day: 'numeric' });

  // Convert client coords → SVG viewBox coords
  function toSvg(clientX, clientY) {
    const ctm = svg.getScreenCTM();
    if (!ctm) return null;
    const pt = svg.createSVGPoint();
    pt.x = clientX; pt.y = clientY;
    return pt.matrixTransform(ctm.inverse());
  }

  // Find nearest point within threshold (SVG units)
  function nearest(sx, sy, threshold = 28) {
    let best = null, bd = threshold * threshold;
    for (const p of _pts) {
      const d2 = (p.sx - sx) ** 2 + (p.sy - sy) ** 2;
      if (d2 < bd) { bd = d2; best = p; }
    }
    return best;
  }

  function showInfo(p, clientX, clientY) {
    const hl = document.getElementById('hl');
    hl.setAttribute('cx', p.sx.toFixed(2));
    hl.setAttribute('cy', p.sy.toFixed(2));

    const { lat, lon } = _loc;
    const times = SunCalc.getTimes(p.date, lat, lon);
    const moon  = SunCalc.getMoonIllumination(p.date);

    const sunriseOk = times.sunrise && !isNaN(times.sunrise.getTime());
    const sunsetOk  = times.sunset  && !isNaN(times.sunset.getTime());

    // Polar day/night: no sunrise/sunset but sun clearly above or below horizon
    const isPolarDay   = _view === 'sky' && !sunriseOk && p.altDeg > 0;
    const isPolarNight = _view === 'sky' && !sunriseOk && p.altDeg <= 0;

    const { icon, name: phaseName } = moonPhaseInfo(moon.phase);
    const illum = Math.round(moon.fraction * 100);

    let rows = `<div class="info-date">${fmt.format(p.date)}</div>`;

    if (_view === 'sky') {
      const azDir = p.azDeg < -0.05 ? `${Math.abs(p.azDeg).toFixed(1)}° E`
                  : p.azDeg >  0.05 ? `${p.azDeg.toFixed(1)}° W`
                  : 'S';
      rows += `<div class="info-row"><span>Altitude</span><span>${p.altDeg.toFixed(1)}°</span></div>`;
      rows += `<div class="info-row"><span>Azimuth</span><span>${azDir}</span></div>`;
    } else {
      const eotSign = p.eot >= 0 ? '+' : '';
      rows += `<div class="info-row"><span>Eq. of Time</span><span>${eotSign}${p.eot.toFixed(1)} min</span></div>`;
      rows += `<div class="info-row"><span>Declination</span><span>${p.declDeg.toFixed(2)}°</span></div>`;
    }
    rows += `<hr class="info-sep">`;

    if (isPolarDay) {
      rows += `<div class="info-polar">Sun up all day</div>`;
      rows += `<div class="info-row"><span>Day length</span><span>24h 00m</span></div>`;
      rows += `<div class="info-row"><span>Night length</span><span>0h 00m</span></div>`;
    } else if (isPolarNight) {
      rows += `<div class="info-polar">Sun never rises</div>`;
      rows += `<div class="info-row"><span>Day length</span><span>0h 00m</span></div>`;
      rows += `<div class="info-row"><span>Night length</span><span>24h 00m</span></div>`;
    } else {
      const srStr = toSolarTimeStr(times.sunrise, lon) || '—';
      const ssStr = toSolarTimeStr(times.sunset,  lon) || '—';
      rows += `<div class="info-row"><span>Sunrise</span><span>${srStr}</span></div>`;
      rows += `<div class="info-row"><span>Sunset</span><span>${ssStr}</span></div>`;
      if (sunriseOk && sunsetOk) {
        const dayMs   = times.sunset - times.sunrise;
        const nightMs = 864e5 - dayMs;
        rows += `<div class="info-row"><span>Day length</span><span>${fmtDuration(dayMs)}</span></div>`;
        rows += `<div class="info-row"><span>Night length</span><span>${fmtDuration(nightMs)}</span></div>`;
      }
    }

    rows += `<hr class="info-sep">`;
    rows += `<div class="info-moon">${icon} ${phaseName} · ${illum}%</div>`;

    info.innerHTML = rows;
    info.classList.toggle('pinned', _pinned);
    info.style.display = 'block';

    // Position panel near cursor, clamped to viewport
    const vw = window.innerWidth, vh = window.innerHeight;
    const iw = info.offsetWidth  || 220;
    const ih = info.offsetHeight || 160;
    let left = clientX + 16, top = clientY - 20;
    if (left + iw > vw - 8) left = clientX - iw - 12;
    if (top < 8) top = clientY + 12;
    if (top + ih > vh - 8) top = vh - ih - 8;
    info.style.left = left + 'px';
    info.style.top  = top  + 'px';
  }

  function hideInfo() {
    const hl = document.getElementById('hl');
    if (hl) { hl.setAttribute('cx', -100); hl.setAttribute('cy', -100); }
    info.style.display = 'none';
  }

  svg.addEventListener('pointermove', e => {
    if (_pinned) return;
    const sp = toSvg(e.clientX, e.clientY);
    if (!sp) return;
    const p = nearest(sp.x, sp.y);
    p ? showInfo(p, e.clientX, e.clientY) : hideInfo();
  });

  svg.addEventListener('pointerdown', e => {
    e.preventDefault(); // prevent text selection / scroll on touch
    const sp = toSvg(e.clientX, e.clientY);
    if (!sp) return;
    const p = nearest(sp.x, sp.y);
    if (!p) { _pinned = false; _pinnedDoy = null; hideInfo(); return; }
    if (_pinned && _pinnedDoy === p.doy) {
      // tap same point again → unpin
      _pinned = false; _pinnedDoy = null;
      info.classList.remove('pinned');
    } else {
      _pinned = true; _pinnedDoy = p.doy;
      showInfo(p, e.clientX, e.clientY);
    }
  });

  svg.addEventListener('pointerleave', () => {
    if (!_pinned) hideInfo();
  });
}

// ── Location controls ─────────────────────────────────────────────────────────
function setupLocationControls() {
  const cityInput = document.getElementById('cityInput');
  const cityDrop  = document.getElementById('cityDrop');
  const latInput  = document.getElementById('latInput');
  const lonInput  = document.getElementById('lonInput');
  const geoBtn    = document.getElementById('geoBtn');

  // Initialise inputs from DEFAULT
  cityInput.value = DEFAULT.name;
  latInput.value  = DEFAULT.lat.toFixed(4);
  lonInput.value  = DEFAULT.lon.toFixed(4);

  let activeIdx  = -1;
  let _matches   = [];   // selectable items (separator items excluded)
  let _liveTimer = null;
  let _liveQuery = '';

  function triggerRender(lat, lon, name) {
    const lmstHour = parseInt(_slider.value, 10) / 60;
    _pinned = false; _pinnedDoy = null;
    document.getElementById('info').style.display = 'none';
    render({ lat, lon, name }, lmstHour, YEAR);
  }

  // sepAfter: insert an "online results" separator before this index (-1 = none)
  function openDrop(matches, sepAfter = -1) {
    _matches  = matches;
    activeIdx = -1;
    cityDrop.innerHTML = '';
    if (!matches.length) { cityDrop.classList.remove('open'); return; }
    for (const [i, c] of matches.entries()) {
      if (sepAfter > 0 && i === sepAfter) {
        const sep = document.createElement('li');
        sep.className   = 'drop-sep';
        sep.textContent = '🌐 online results';
        cityDrop.appendChild(sep);
      }
      const li = document.createElement('li');
      li.textContent = c.admin1 ? `${c.name}, ${c.admin1}, ${c.country}` : `${c.name}, ${c.country}`;
      li.addEventListener('pointerdown', e => { e.preventDefault(); selectCity(c); });
      cityDrop.appendChild(li);
    }
    cityDrop.classList.add('open');
  }

  function showDropNotice(msg) {
    cityDrop.innerHTML = '';
    const li = document.createElement('li');
    li.className   = 'drop-sep';
    li.textContent = msg;
    cityDrop.appendChild(li);
    cityDrop.classList.add('open');
  }

  function closeDrop() {
    cityDrop.classList.remove('open');
    activeIdx = -1;
    _matches  = [];
  }

  function selectCity(c) {
    cityInput.value = c.name;
    latInput.value  = c.lat.toFixed(4);
    lonInput.value  = c.lon.toFixed(4);
    closeDrop();
    triggerRender(c.lat, c.lon, c.name);
  }

  function filterCities(q) {
    const lq = q.toLowerCase();
    return CITIES.filter(c =>
      c.name.toLowerCase().includes(lq) || c.country.toLowerCase() === lq
    ).slice(0, 8);
  }

  // Live geocoding via Open-Meteo (no API key, CORS-enabled)
  async function fetchLive(q, bundled) {
    if (q !== _liveQuery) return;
    let controller, timeout;
    try {
      controller = new AbortController();
      timeout    = setTimeout(() => controller.abort(), 5000);
      const url  = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=8&language=en&format=json`;
      const res  = await fetch(url, { signal: controller.signal });
      clearTimeout(timeout);
      if (q !== _liveQuery) return;
      if (!res.ok) return;
      const data = await res.json();
      if (q !== _liveQuery) return;

      const bundledKeys = new Set(bundled.map(c => `${c.name.toLowerCase()}|${c.country.toLowerCase()}`));
      const live = (data.results || [])
        .map(r => ({ name: r.name, country: r.country_code, admin1: r.admin1 || '', lat: r.latitude, lon: r.longitude }))
        .filter(c => !bundledKeys.has(`${c.name.toLowerCase()}|${c.country.toLowerCase()}`))
        .slice(0, 6);

      if (!live.length) return;
      openDrop([...bundled, ...live], bundled.length);
    } catch {
      clearTimeout(timeout);
      if (q !== _liveQuery) return;
      // offline/timeout — show notice only when bundled list is also empty
      if (bundled.length === 0) showDropNotice('⚠ offline — bundled cities only');
    }
  }

  cityInput.addEventListener('input', () => {
    const q = cityInput.value.trim();
    clearTimeout(_liveTimer);
    if (!q) { closeDrop(); _liveQuery = ''; return; }
    const bundled = filterCities(q);
    openDrop(bundled);
    _liveQuery = q;
    _liveTimer = setTimeout(() => fetchLive(q, bundled), 400);
  });

  cityInput.addEventListener('keydown', e => {
    const selectables = [...cityDrop.querySelectorAll('li:not(.drop-sep)')];
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIdx = Math.min(activeIdx + 1, selectables.length - 1);
      selectables.forEach((li, i) => li.classList.toggle('ac-active', i === activeIdx));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIdx = Math.max(activeIdx - 1, -1);
      selectables.forEach((li, i) => li.classList.toggle('ac-active', i === activeIdx));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (activeIdx >= 0 && _matches[activeIdx]) {
        selectCity(_matches[activeIdx]);
      } else {
        closeDrop();
        const q = cityInput.value.trim();
        const exact = CITIES.find(c => c.name.toLowerCase() === q.toLowerCase());
        if (exact) selectCity(exact);
      }
    } else if (e.key === 'Escape') {
      closeDrop();
      cityInput.blur();
    }
  });

  cityInput.addEventListener('blur', () => {
    // Delay so pointerdown on a list item fires first
    setTimeout(closeDrop, 150);
  });

  // Manual lat/lon
  function applyCoords() {
    const lat = parseFloat(latInput.value);
    const lon = parseFloat(lonInput.value);
    if (isNaN(lat) || isNaN(lon)) return;
    if (lat < -90 || lat > 90 || lon < -180 || lon > 180) return;
    const match = CITIES.find(c => Math.abs(c.lat - lat) < 0.01 && Math.abs(c.lon - lon) < 0.01);
    const name  = match ? match.name : `${lat >= 0 ? lat.toFixed(2)+'°N' : Math.abs(lat).toFixed(2)+'°S'}, ${lon >= 0 ? lon.toFixed(2)+'°E' : Math.abs(lon).toFixed(2)+'°W'}`;
    cityInput.value = match ? match.name : '';
    triggerRender(lat, lon, name);
  }

  latInput.addEventListener('change', applyCoords);
  lonInput.addEventListener('change', applyCoords);
  latInput.addEventListener('keydown', e => { if (e.key === 'Enter') { applyCoords(); latInput.blur(); } });
  lonInput.addEventListener('keydown', e => { if (e.key === 'Enter') { applyCoords(); lonInput.blur(); } });

  // Geolocation
  if ('geolocation' in navigator) {
    geoBtn.addEventListener('click', () => {
      geoBtn.textContent = '⌛';
      navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        latInput.value  = lat.toFixed(4);
        lonInput.value  = lon.toFixed(4);
        cityInput.value = '';
        geoBtn.textContent = '📍';
        const name = `${lat >= 0 ? lat.toFixed(2)+'°N' : Math.abs(lat).toFixed(2)+'°S'}, ${lon >= 0 ? lon.toFixed(2)+'°E' : Math.abs(lon).toFixed(2)+'°W'}`;
        triggerRender(lat, lon, name);
      }, () => {
        geoBtn.textContent = '📍';
      });
    });
  } else {
    geoBtn.style.display = 'none';
  }
}

// ── Time slider ───────────────────────────────────────────────────────────────
const _slider  = document.getElementById('timeSlider');
const _readout = document.getElementById('timeReadout');

function minutesToTimeStr(minutes) {
  const hh = Math.floor(minutes / 60) % 24;
  const mm = minutes % 60;
  return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}

_slider.addEventListener('input', () => {
  const minutes  = parseInt(_slider.value, 10);
  const lmstHour = minutes / 60;
  _readout.textContent = minutesToTimeStr(minutes);
  // Reset pin so the old panel doesn't show stale coordinates
  _pinned = false; _pinnedDoy = null;
  document.getElementById('info').style.display = 'none';
  render(_loc, lmstHour, YEAR);
});

render();
setupInteraction();
setupLocationControls();

// ── View toggle ───────────────────────────────────────────────────────────────
document.getElementById('btnSky').addEventListener('click', () => {
  if (_view === 'sky') return;
  _view = 'sky';
  document.getElementById('btnSky').classList.add('active');
  document.getElementById('btnEot').classList.remove('active');
  _pinned = false; _pinnedDoy = null;
  document.getElementById('info').style.display = 'none';
  render(_loc, parseInt(_slider.value, 10) / 60, YEAR);
});
document.getElementById('btnEot').addEventListener('click', () => {
  if (_view === 'eot') return;
  _view = 'eot';
  document.getElementById('btnEot').classList.add('active');
  document.getElementById('btnSky').classList.remove('active');
  _pinned = false; _pinnedDoy = null;
  document.getElementById('info').style.display = 'none';
  render(_loc, parseInt(_slider.value, 10) / 60, YEAR);
});
document.getElementById('btnMarkers').addEventListener('click', () => {
  _markersOn = !_markersOn;
  document.getElementById('btnMarkers').classList.toggle('active', _markersOn);
  render(_loc, parseInt(_slider.value, 10) / 60, YEAR);
});
</script>
</body>
